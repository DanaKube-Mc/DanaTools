  - "vein_miner"

# Recette de forge (commune pour tous les niveaux)
template-item:
  material: "NETHERITE_UPGRADE_SMITHING_TEMPLATE"
  custom-model-data: 5001
  display-name: "&6Placard de Forge : Excavation"

ingredient-item:
  material: "PLAYER_HEAD"
  # Texture Base64 du Noyau de Terre
  texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYjViNTVhM2I0OTlhNDk2YTkyODkyYjRlYTVmZGQ2NThkOWQ1N2UxNjgxMWI1MzVkM2M2M2NhNDhjYjU0YTkifX19"
  display-name: "&eNoyau de Terre"

