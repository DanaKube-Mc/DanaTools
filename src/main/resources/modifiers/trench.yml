      range: 2 # Rayon de 2 blocs (5x5)
  3:
    display-name: "&6Modificateur : Excavation III"
    lore:
      - "&7Mine en zone 7x7."
      - "&dSlots requis : &f4"
    slot-cost: 4
    min-tool-level: 15
