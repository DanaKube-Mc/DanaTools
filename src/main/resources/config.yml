# ==========================================
# Config Generale - DanaTools
# ==========================================

# Langue utilisee par le plugin.
# Doit correspondre a un fichier present dans le dossier lang/. (Exemple: fr.yml)
lang: "fr"

# Paramètres globaux de la barre de progression
progress-bar:
  length: 10                     # Nombre total de symboles dans la barre
  symbol: "■"                    # Symbole utilisé (ex: "■", "█", "|", "▪")
  color-filled: "<gradient:#2ecc71:#a3cb38>" # Couleur/Gradient du remplissage (MiniMessage)
  color-empty: "<gray>"          # Couleur de la partie non remplie
  show-percentage-inside: false  # Affiche le pourcentage au milieu de la barre (ex: ■■■■40%■■■■)

# Configuration des notifications de drop de noyaux
core-drop-settings:
  # Notification dans l'Action Bar
  action-bar:
    enabled: true
    message: "<green>[DanaTools] Vous avez trouvé un Noyau Élémentaire !" # Supporte Kyori MiniMessage
  # Effet sonore joué au joueur
  sound:
    enabled: true
    type: "BLOCK_AMETHYST_BLOCK_CHIME" # Nom du Sound Bukkit/Spigot
    volume: 1.0
    pitch: 1.2
  # Effet de particules au sol à l'emplacement du bloc brisé
  particles:
    enabled: true
    type: "HAPPY_VILLAGER" # Nom de la Particle Bukkit/Spigot
    count: 15
    offset: 0.3
    speed: 0.1

