name: DanaTools
version: ${project.version}
main: com.danakube.danatools.DanaTools
api-version: '1.21'
author: BaByCrash & DanaKube
description: Plugin de progression d'outils évolutifs et modificateurs de forge.
commands:
  danatools:
    description: Commande principale d'administration de DanaTools.
    aliases: [dtools, dt]
    permission: danatools.admin
    usage: /danatools [give/givemodifier/addxp/setlevel/reload]
permissions:
  danatools.admin:
    description: Permet d'utiliser toutes les commandes d'administration de DanaTools.
    default: op
